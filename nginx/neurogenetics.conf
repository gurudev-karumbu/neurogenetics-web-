# HTTP → HTTPS redirect
server {
    listen 80;
    server_name neurogenetics.my www.neurogenetics.my;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name neurogenetics.my www.neurogenetics.my;

    # Let's Encrypt certs (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/neurogenetics.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neurogenetics.my/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://nextjs:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://nextjs:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # App
    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
