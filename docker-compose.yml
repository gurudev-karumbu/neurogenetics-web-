services:

  nextjs:
    build: .
    restart: unless-stopped
    env_file: .env.local
    ports:
      - "7000:7000"
    volumes:
      - blog_content:/app/content/blogs
    networks:
      - web

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/neurogenetics.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - nextjs
    networks:
      - web

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renews cert every 12 hours if needed
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  blog_content:
  letsencrypt:
  certbot_www:

networks:
  web:
    driver: bridge
